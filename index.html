<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網路檢測工具箱</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --text: #f8fafc;
      --border: #334155;
    }
    
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      line-height: 1.5;
    }

    h1 {
      text-align: center;
      color: var(--accent);
      font-size: 1.5rem;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .ip-box {
      background: linear-gradient(135deg, #0284c7, #0369a1);
      padding: 16px;
      border-radius: 12px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(2, 132, 199, 0.25);
    }

    .card {
      background: var(--card-bg);
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    input {
      flex: 1 1 200px;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #090d16;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    input:focus { border-color: var(--accent); }

    .port-input { flex: 0 0 110px; }

    button {
      padding: 12px 20px;
      background: var(--accent-hover);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      white-space: nowrap;
    }

    button:active {
      transform: scale(0.98);
      background: #075985;
    }

    pre {
      background: #090d16;
      padding: 12px;
      border-radius: 8px;
      color: var(--accent);
      overflow-x: auto;
      white-space: pre-wrap;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.9rem;
      min-height: 48px;
      margin: 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    @media (max-width: 600px) {
      body { padding: 12px; }
      h1 { font-size: 1.3rem; }
      .input-group { flex-direction: column; gap: 8px; }
      input, .port-input, button { width: 100%; flex: none; }
      button { padding: 14px; margin-top: 4px; }
    }
  </style>
</head>
<body>

  <h1>🌐 網路檢測工具箱</h1>

  <div class="ip-box">
    您的工作端 WAN IP：<span id="wan-ip">載入中...</span>
  </div>

  <div class="card">
    <h2>1. Ping 測試 (5 個封包)</h2>
    <div class="input-group">
      <input type="text" id="ping-target" placeholder="輸入 IP 或網域 (例: 168.95.1.1 或 google.com)" autocapitalize="none" autocorrect="off">
      <button onclick="runPing()">開始 Ping</button>
    </div>
    <pre id="ping-result">等待測試...</pre>
  </div>

  <div class="card">
    <h2>2. Telnet (TCP Port 檢測)</h2>
    <div class="input-group">
      <input type="text" id="telnet-host" placeholder="IP 或網域 (例: 1.1.1.1)" autocapitalize="none" autocorrect="off">
      <input type="number" id="telnet-port" class="port-input" placeholder="Port (例: 80)" inputmode="numeric">
      <button onclick="runTelnet()">測試 Port</button>
    </div>
    <pre id="telnet-result">等待測試...</pre>
  </div>

  <script>
    const BACKEND_URL = 'https://minglin6855-github-io-lantool.onrender.com';

    async function fetchWanIp() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/myip`);
        if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
        const data = await res.json();
        document.getElementById('wan-ip').innerText = data.ip;
      } catch (err) {
        document.getElementById('wan-ip').innerText = '無法讀取 IP (' + err.message + ')';
      }
    }
    fetchWanIp();

    async function sendRequest(path, body, resultId) {
      const resultElem = document.getElementById(resultId);
      resultElem.innerText = '執行中，請稍候...';

      try {
        const res = await fetch(`${BACKEND_URL}${path}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const contentType = res.headers.get("content-type");
        
        if (res.ok && contentType && contentType.includes("application/json")) {
          const data = await res.json();
          resultElem.innerText = data.output || data.message || JSON.stringify(data, null, 2);
        } else {
          const errorText = await res.text();
          resultElem.innerText = `[伺服器回應異常 ${res.status}]\n` + errorText;
        }
      } catch (err) {
        resultElem.innerText = '連線失敗：' + err.message;
      }
    }

    function runPing() {
      const target = document.getElementById('ping-target').value;
      if (!target) return alert('請輸入目標 IP 或網域');
      sendRequest('/api/ping', { target }, 'ping-result');
    }

    function runTelnet() {
      const host = document.getElementById('telnet-host').value;
      const port = document.getElementById('telnet-port').value;
      if (!host || !port) return alert('請輸入完整的 IP 與 Port');
      sendRequest('/api/telnet', { host, port }, 'telnet-result');
    }
  </script>
</body>
</html>
