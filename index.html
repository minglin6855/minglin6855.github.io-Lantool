<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網路檢測工具箱</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text: #f8fafc;
      --muted: #94a3b8;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { text-align: center; color: var(--accent); }
    .ip-box {
      background: #0284c7;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
    }
    .card h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent); }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
    }
    button {
      padding: 10px 20px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #0369a1; }
    pre {
      background: #090d16;
      padding: 12px;
      border-radius: 4px;
      color: #38bdf8;
      overflow-x: auto;
      white-space: pre-wrap;
      font-family: monospace;
      min-height: 40px;
      margin: 0;
    }
  </style>
</head>
<body>

  <h1>🌐 網路工具與 WAN IP 查詢</h1>

  <div class="ip-box">
    您的工作端 WAN IP：<span id="wan-ip">載入中...</span>
  </div>

  <div class="card">
    <h2>1. Ping 測試 (5 個封包)</h2>
    <div class="input-group">
      <input type="text" id="ping-target" placeholder="輸入 IP 或網域 (例: 8.8.8.8 或 google.com)">
      <button onclick="runPing()">開始 Ping</button>
    </div>
    <pre id="ping-result">等待測試...</pre>
  </div>

  <div class="card">
    <h2>2. Telnet (TCP Port 檢測)</h2>
    <div class="input-group">
      <input type="text" id="telnet-host" placeholder="IP 或網域 (例: 1.1.1.1)">
      <input type="number" id="telnet-port" placeholder="Port (例: 80, 443)" style="max-width: 150px;">
      <button onclick="runTelnet()">測試 Port</button>
    </div>
    <pre id="telnet-result">等待測試...</pre>
  </div>

  <div class="card">
    <h2>3. 追蹤路由 (Traceroute)</h2>
    <div class="input-group">
      <input type="text" id="trace-target" placeholder="輸入 IP 或網域 (例: 1.1.1.1)">
      <button onclick="runTraceroute()">開始追蹤</button>
    </div>
    <pre id="trace-result">等待測試...</pre>
  </div>

  <script>
    // 自動取得工作端 WAN IP
    async function fetchWanIp() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        document.getElementById('wan-ip').innerText = data.ip;
      } catch {
        document.getElementById('wan-ip').innerText = '無法讀取 IP';
      }
    }
    fetchWanIp();

    // API 呼叫輔助函式
    async function sendRequest(url, body, resultId) {
      const resultElem = document.getElementById(resultId);
      resultElem.innerText = '執行中，請稍候...';
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        resultElem.innerText = data.output || data.message || JSON.stringify(data);
      } catch (err) {
        resultElem.innerText = '發生錯誤：' + err.message;
      }
    }

    function runPing() {
      const target = document.getElementById('ping-target').value;
      if (!target) return alert('請輸入目標 IP 或網域');
      sendRequest('/api/ping', { target }, 'ping-result');
    }

    function runTelnet() {
      const host = document.getElementById('telnet-host').value;
      const port = document.getElementById('telnet-port').value;
      if (!host || !port) return alert('請輸入完整的 IP 與 Port');
      sendRequest('/api/telnet', { host, port }, 'telnet-result');
    }

    function runTraceroute() {
      const target = document.getElementById('trace-target').value;
      if (!target) return alert('請輸入目標 IP 或網域');
      sendRequest('/api/traceroute', { target }, 'trace-result');
    }
  </script>
</body>
</html>
